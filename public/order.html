<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>ZORX Order</title></head>
<body>
<!-- This file exists so Netlify's form scanner can detect the zorx-order form.
     Do not delete this file. It is required for order notifications to work. -->
<form name="zorx-order" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="zorx-order" />
  <input name="bot-field" />
  <input name="name" />
  <input name="phone" />
  <input name="city" />
  <input name="address" />
  <input name="payment" />
  <input name="items" />
  <input name="total" />
</form>
</body>
</html>
